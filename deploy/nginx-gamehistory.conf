# 复制到 /etc/nginx/sites-available/gamehistory 后启用站点。
# server_name 与 root 可由 install-ecs.sh 替换。
# TLS 证书：install-ecs.sh 会写入 /etc/nginx/ssl/（默认自签名，可用 certbot 替换为 Let's Encrypt）。

server {
    listen 80;
    listen [::]:80;
    server_name __SERVER_NAME__;

    root __WEB_ROOT__;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|webp|ico|svg|json|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __SERVER_NAME__;

    ssl_certificate     /etc/nginx/ssl/gamehistory.crt;
    ssl_certificate_key /etc/nginx/ssl/gamehistory.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root __WEB_ROOT__;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|webp|ico|svg|json|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
}
